  // QUIZ (17 questões adaptadas ao 9º ano)
  const quizData = [
    { question: "Quantas semanas de planejamento o material prevê para as 16 missões?", options: ["28 semanas", "32 semanas", "36 semanas", "40 semanas"], correct: 1, explanation: "O manual descreve 32 semanas (4 bimestres, 8 semanas cada)." },
    { question: "Qual eixo do conhecimento Saeb aborda equações e funções de 1º e 2º grau?", options: ["Números", "Álgebra", "Geometria", "Grandezas e Medidas"], correct: 1, explanation: "Álgebra é o eixo responsável por equações, funções e modelagem algébrica." },
    { question: "Qual código da Escala de Proficiência (nível 2) significa 'Associar número racional (quantia monetária) escrito por extenso à decimal'?", options: ["N1.4", "N2.2", "N3.5", "N4.2"], correct: 1, explanation: "N2.2: associar um número racional que representa quantia monetária, escrito por extenso, à sua representação decimal." },
    { question: "Quantas missões compõem o 1º bimestre?", options: ["3 missões", "4 missões", "5 missões", "6 missões"], correct: 1, explanation: "1º bimestre: Missões 1 a 4 (Números, frações, porcentagem, reta numérica)." },
    { question: "Qual habilidade Saeb corresponde a 'Resolver problemas com números reais e notação científica'?", options: ["9N1.3", "9N2.1", "9A2.5", "9M2.3"], correct: 1, explanation: "9N2.1: resolver problemas com números reais, inclusive notação científica." },
    { question: "O descritor N5.10 (nível 5) avalia qual competência?", options: ["Calcular área de figuras planas", "Avaliar comportamento de função gráfica (crescimento)", "Resolver sistema linear 2x2", "Identificar porcentagem"], correct: 1, explanation: "N5.10: Avaliar o comportamento de uma função representada graficamente quanto ao crescimento." },
    { question: "Qual eixo cognitivo está relacionado a 'Compreender e aplicar conceitos e procedimentos'?", options: ["Eixo I", "Eixo II", "Eixo III", "Eixo V"], correct: 0, explanation: "Eixo Cognitivo I: compreender e aplicar conceitos/procedimentos. Eixo II: resolver problemas e argumentar." },
    { question: "Qual habilidade da BNCC está associada a 'Resolver problemas com porcentagens, aumentos e descontos'?", options: ["EF06MA07", "EF09MA05", "EF08MA06", "EF09MA04"], correct: 1, explanation: "EF09MA05: resolver problemas que envolvam porcentagens, com a ideia de aplicação de percentuais sucessivos." },
    { question: "Na escala de proficiência, o nível N4.2 descreve:", options: ["Reconhecer coordenadas de ponto no plano cartesiano", "Determinar volume de cubo", "Interpretar gráfico de setores", "Calcular probabilidade"], correct: 0, explanation: "N4.2: Reconhecer as coordenadas de um ponto dado em um plano cartesiano." },
    { question: "Qual descritor Saeb está ligado à resolução de sistemas lineares associando a matriz?", options: ["D9", "D31", "D22", "D17"], correct: 1, explanation: "D31: Determinar a solução de um sistema linear associando-o a uma matriz." },
    { question: "O eixo Grandezas e Medidas inclui habilidade de:", options: ["Resolver problemas com área de figuras planas", "Interpretar gráficos de setores", "Classificar triângulos", "Identificar progressões"], correct: 0, explanation: "9M2.3: resolver problemas que envolvam área de figuras planas." },
    { question: "Qual missão trabalha 'Funções afim e plano cartesiano' de forma aprofundada?", options: ["Missão 8", "Missão 10", "Missão 12", "Missão 14"], correct: 2, explanation: "Missão 12: Funções afim e plano cartesiano, associando equações a retas." },
    { question: "Na articulação Saeb-BNCC, a habilidade 9E2.1 está relacionada a:", options: ["Resolver problemas com tabelas e gráficos", "Calcular juros compostos", "Determinar função exponencial", "Construir sólidos geométricos"], correct: 0, explanation: "9E2.1: resolver problemas com dados estatísticos em tabelas e gráficos." },
    { question: "Qual a principal função do agrupamento produtivo (ZDP) sugerido no material?", options: ["Avaliação individual", "Colaboração entre níveis distintos (monitor/par/aprendente)", "Realizar simulados", "Lista de exercícios extras"], correct: 1, explanation: "Agrupamentos baseados em Vygotsky: monitor (proficiente) ajuda par e aprendente." },
    { question: "Qual código da BNCC trabalha 'Gráficos de funções de 2º grau e máximos/mínimos' no 9º ano?", options: ["EF09MA06", "EF09MA07", "EF08MA07", "EF09MA08"], correct: 0, explanation: "EF09MA06: compreender funções e suas representações (incluindo gráficos)." },
    { question: "O total de aulas sugerido para o desenvolvimento de todas as missões é de:", options: ["48 aulas", "56 aulas", "64 aulas", "72 aulas"], correct: 2, explanation: "16 missões × 4 aulas = 64 aulas (32 semanas)." },
    { question: "Qual habilidade Saeb está diretamente ligada ao cálculo do perímetro de figuras planas?", options: ["9M2.1", "9M2.2", "9M2.3", "9M2.4"], correct: 1, explanation: "9M2.2: resolver problemas que envolvam perímetro de figuras planas." }
  ];

  // Telas inicial e final
  const startSlide = {
    type: "start",
    title: "🎓 Bem-vindo ao SP em Ação - Matemática 2 (9º ano)",
    content: `<div style="text-align: center; margin: 20px 0;">
      <i class="fas fa-chalkboard-teacher" style="font-size: 48px; color: var(--vm); margin-bottom: 15px; display: inline-block;"></i>
      <h2 style="color: var(--az);">Apresentação interativa + Quiz</h2>
      <p style="font-size: 16px;">Explore o conteúdo do Manual do Professor, entenda a estrutura das 16 Missões, os eixos Saeb, a escala de proficiência e muito mais.</p>
      <div style="background: var(--az-l); border-radius: 20px; padding: 16px; margin: 20px 0;">
        <p><strong>📚 O que você vai encontrar:</strong></p>
        <p>✅ 13 slides de fundamentação teórica e prática<br>✅ 17 questões interativas para testar seus conhecimentos<br>
        <p><strong>🎯 Clique em "Próximo" para iniciar a jornada!</strong></p>
      </div>
      <button id="startBtn" class="btn-nav btn-primary" style="margin-top: 10px;">Começar apresentação <i class="fas fa-arrow-right"></i></button>
    </div>`
  };

  const endSlide = {
    type: "end",
    title: "🏆 Parabéns! Você concluiu a apresentação",
    content: `<div style="text-align: center;">
      <i class="fas fa-trophy" style="font-size: 52px; color: var(--gold); margin-bottom: 15px;"></i>
      <h2 style="color: var(--az);">Quiz finalizado</h2>
      <div id="finalScoreMessage" style="font-size: 20px; font-weight: 800; margin: 20px 0; background: var(--cl); border-radius: 40px; padding: 12px;"></div>
      <p>Você revisou os principais conceitos do material SP em Ação - Matemática 2, alinhado à BNCC e à Matriz Saeb para o 9º ano.</p>
      <p><strong>Continue aplicando essas estratégias em sala de aula e potencialize a aprendizagem dos seus estudantes!</strong></p>
      <button id="restartBtn" class="restart-btn"><i class="fas fa-redo-alt"></i> Reiniciar apresentação</button>
    </div>`
  };

  // Montagem dos slides: start + 13 info + 17 quiz + end
  const allSlides = [];
  allSlides.push({ type: "start", data: startSlide });
  for(let i=0; i<infoSlides.length; i++) allSlides.push({ type: "info", data: infoSlides[i] });
  for(let i=0; i<quizData.length; i++) allSlides.push({ type: "quiz", data: quizData[i], indexQuiz: i });
  allSlides.push({ type: "end", data: endSlide });

  let userAnswers = new Array(quizData.length).fill(null);
  let currentSlide = 0;

  function updateScoreDisplay() {
    let correctCount = 0;
    for(let i=0; i<quizData.length; i++) if(userAnswers[i] !== null && userAnswers[i] === quizData[i].correct) correctCount++;
    document.getElementById("quizScoreDisplay").innerHTML = `<i class="fas fa-star"></i> Quiz: ${correctCount}/${quizData.length}`;
    return correctCount;
  }

  function renderSlide() {
    const container = document.getElementById("slideContainer");
    if(!container) return;
    const slideObj = allSlides[currentSlide];
    let html = `<div class="slide">`;
    if(slideObj.type === "start") {
      html += `<h1>${slideObj.data.title}</h1><div>${slideObj.data.content}</div></div>`;
      container.innerHTML = html;
      const startBtn = document.getElementById("startBtn");
      if(startBtn) startBtn.addEventListener("click", () => { if(currentSlide < allSlides.length-1) { currentSlide++; renderSlide(); } });
    } 
    else if(slideObj.type === "end") {
      const correctCount = updateScoreDisplay();
      html += `<h1>${slideObj.data.title}</h1>`;
      let finalMsg = slideObj.data.content;
      finalMsg = finalMsg.replace('<div id="finalScoreMessage" style="font-size: 20px; font-weight: 800; margin: 20px 0; background: var(--cl); border-radius: 40px; padding: 12px;"></div>', 
        `<div id="finalScoreMessage" style="font-size: 20px; font-weight: 800; margin: 20px 0; background: var(--cl); border-radius: 40px; padding: 12px;">🎯 Você acertou ${correctCount} de ${quizData.length} questões! 🎯</div>`);
      html += `<div>${finalMsg}</div></div>`;
      container.innerHTML = html;
      const restartBtn = document.getElementById("restartBtn");
      if(restartBtn) restartBtn.addEventListener("click", () => { userAnswers.fill(null); currentSlide = 0; renderSlide(); updateScoreDisplay(); });
    }
    else if(slideObj.type === "info") {
      html += `<h1>${slideObj.data.title}</h1><div>${slideObj.data.content}</div></div>`;
      container.innerHTML = html;
    } 
    else if(slideObj.type === "quiz") {
      const q = slideObj.data;
      const qIndex = slideObj.indexQuiz;
      const selectedOpt = userAnswers[qIndex];
      html += `<h1><i class="fas fa-question-circle" style="color:var(--vm);"></i> Quiz: Questão ${currentSlide - (1 + infoSlides.length) + 1}/${quizData.length}</h1>`;
      html += `<div style="background:var(--az-l); border-radius:20px; padding:12px 20px; margin-bottom:18px;"><strong style="font-size:18px;">❓ ${q.question}</strong></div>`;
      html += `<div class="quiz-options">`;
      q.options.forEach((opt, idx) => {
        let isSelected = (selectedOpt === idx);
        html += `<div class="quiz-option ${isSelected ? 'selected' : ''}" data-qidx="${qIndex}" data-optidx="${idx}">${String.fromCharCode(65+idx)}. ${opt}</div>`;
      });
      html += `</div>`;
      if(selectedOpt !== null) {
        const isCorrect = (selectedOpt === q.correct);
        const correctLetter = String.fromCharCode(65+q.correct);
        html += `<div class="feedback ${isCorrect ? 'correct-fb' : 'wrong-fb'}">
          <i class="fas ${isCorrect ? 'fa-check-circle' : 'fa-times-circle'}"></i> 
          ${isCorrect ? '✅ Correta!' : `❌ Incorreta. Resposta correta: ${correctLetter}. ${q.explanation}`}
          ${isCorrect ? ` ${q.explanation}` : ''}
        </div>`;
      } else {
        html += `<div class="feedback" style="background:#f0f0f0;"><i class="fas fa-lightbulb"></i> Selecione uma alternativa para ver o feedback.</div>`;
      }
      html += `</div>`;
      container.innerHTML = html;
      document.querySelectorAll('.quiz-option').forEach(el => {
        el.addEventListener('click', (e) => {
          const qidx = parseInt(el.dataset.qidx);
          const optidx = parseInt(el.dataset.optidx);
          if(!isNaN(qidx) && !isNaN(optidx)) {
            userAnswers[qidx] = optidx;
            renderSlide();
            updateScoreDisplay();
          }
        });
      });
    }
    updateDotsAndCounter();
  }

  function updateDotsAndCounter() {
    const dotsDiv = document.getElementById("dotsContainer");
    const counterSpan = document.getElementById("slideCounter");
    if(dotsDiv) {
      let dotsHtml = "";
      for(let i=0; i<allSlides.length; i++) {
        let activeClass = (i === currentSlide) ? "active" : "";
        dotsHtml += `<div class="dot ${activeClass}" data-slideidx="${i}"></div>`;
      }
      dotsDiv.innerHTML = dotsHtml;
      document.querySelectorAll('.dot').forEach(dot => {
        dot.addEventListener('click', (e) => {
          const idx = parseInt(dot.dataset.slideidx);
          if(!isNaN(idx) && idx>=0 && idx<allSlides.length) { currentSlide = idx; renderSlide(); }
        });
      });
    }
    if(counterSpan) {
      let slideLabel = "";
      if(currentSlide === 0) slideLabel = "Tela Inicial";
      else if(currentSlide === allSlides.length-1) slideLabel = "Tela Final";
      else if(allSlides[currentSlide].type === "quiz") slideLabel = `Quiz (${currentSlide - (1 + infoSlides.length) + 1}/${quizData.length})`;
      else slideLabel = `📖 Conteúdo ${currentSlide - 1} / ${infoSlides.length}`;
      counterSpan.innerText = `Slide ${currentSlide+1} de ${allSlides.length}   |   ${slideLabel}`;
    }
  }

  function nextSlide() {
    if(currentSlide < allSlides.length - 1) currentSlide++;
    else alert("Você concluiu toda a apresentação! Parabéns! 🎉 Use 'Reiniciar' na tela final para refazer.");
    renderSlide();
  }
  function prevSlide() { if(currentSlide > 0) { currentSlide--; renderSlide(); } }

  document.addEventListener("DOMContentLoaded", () => {
    renderSlide();
    document.getElementById("nextBtn").addEventListener("click", nextSlide);
    document.getElementById("prevBtn").addEventListener("click", prevSlide);
    updateScoreDisplay();
  });
</script>
</body>
</html>
